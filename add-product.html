<!DOCTYPE html>
<html>
<head>
<title>Add Product</title>
<link rel="stylesheet" href="css/add.css">
</head>
<body>

<div class="login-box">

<h2>Add New Product 🛍️</h2>

<input type="text" id="productName" placeholder="Product Name">

<input type="number" id="productPrice" placeholder="Price (₵)">

<input type="text" id="productSeller" placeholder="Seller Name">

<input type="text" id="productCategory" placeholder="Category (Laptop, Book, Phone etc)">

<input type="file" id="productImage" accept="image/*">

<textarea id="productDescription" placeholder="Product Description"></textarea>

<br>

<button onclick="addProduct()">
Add Product
</button>

<br><br>

<a href="dashboard.html">
🔙 Back to Dashboard
</a>

</div>

<script src="js/script.js"></script>

</body>
</html>
