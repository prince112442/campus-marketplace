<!DOCTYPE html>
<html>
<head>
    <title>Campus Marketplace</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS File -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <img src="https://image.qwenlm.ai/public_source/a3690c03-71a3-40ef-a2cb-8575070d82f7/1a96907fb-3319-47b5-88fc-05d75df6bbce.png"
            alt="Background">

        <div class="content">
            <h1>Hello, Welcome 👋</h1>
            <p>To Capstone Project<br>Group 22</p>
            <button type="button">Learn More</button>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">

        <div class="header">
            <div class="icon">
                <i class="fas fa-user"></i>
            </div>
            <h2>Campus Marketplace</h2>
        </div>

        <!-- LOGIN FORM -->
        <form>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox">
                    <span>Remember me</span>
                </label>

                <a href="#">Forgot password?</a>
            </div>

           <button type="button" class="login-btn" onclick="login()">
    Login
</button>

        </form>

        <!-- SIGNUP LINK -->
        <div class="signup">
            <p>
                Don't have an account?
                <a href="/signup.html">Sign Up</a>
            </p>
        </div>

    </div>
</div>

<script src="/js/script.js"></script>

</body>
</html>
